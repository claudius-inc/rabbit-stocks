<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, height=282, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stocks</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Main Content Area (no header) -->
    <main id="content">
      
      <!-- Home View -->
      <div id="home-view" class="view active">
        <!-- Indices Ticker -->
        <div id="indices-ticker" class="ticker-bar">
          <div class="ticker-track" id="ticker-track"></div>
        </div>
        <!-- Stocks List -->
        <div id="stocks-list" class="stocks-container"></div>
      </div>

      <!-- Add/Manage View -->
      <div id="add-view" class="view">
        <div class="view-header">
          <button id="add-back-btn" class="icon-btn">${Icons?.back || '←'}</button>
          <span class="view-title">Manage Watchlist</span>
        </div>
        <div class="add-container">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search ticker or name..." autocomplete="off">
            <button id="search-btn" class="icon-btn search-icon"></button>
          </div>
          <div id="search-results"></div>
          <div class="watchlist-section">
            <div class="section-label">Your Watchlist</div>
            <div id="watchlist-manage"></div>
          </div>
        </div>
      </div>

      <!-- Detail View -->
      <div id="detail-view" class="view">
        <div class="view-header">
          <button id="detail-back-btn" class="icon-btn"></button>
          <span class="view-title" id="detail-title">Details</span>
        </div>
        <div id="detail-content"></div>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="home">
        <span class="nav-icon" id="nav-icon-home"></span>
      </button>
      <button class="nav-btn" data-view="add">
        <span class="nav-icon" id="nav-icon-add"></span>
        <span class="nav-label"></span>
      </button>
      <button class="nav-btn" data-action="refresh">
        <span class="nav-icon" id="nav-icon-refresh"></span>
      </button>
    </nav>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-dialog" class="hidden">
      <div class="dialog-box">
        <p id="confirm-message">Are you sure?</p>
        <div class="dialog-buttons">
          <button id="confirm-yes" class="dialog-btn primary"></button>
          <button id="confirm-no" class="dialog-btn secondary"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
